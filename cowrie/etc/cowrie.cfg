[honeypot]
hostname = svr04
log_path = var/log/cowrie
download_path = ${honeypot:state_path}/downloads
share_path = share/cowrie
state_path = var/lib/cowrie
etc_path = etc
contents_path = honeyfs
txtcmds_path = txtcmds
backend = llm
sensor_name = honeypot-01

[shell]
filesystem = var/lib/cowrie/fs.pickle

[ssh]
enabled = true
rsa_public_key = var/lib/cowrie/ssh_host_rsa_key.pub
rsa_private_key = var/lib/cowrie/ssh_host_rsa_key
dsa_public_key = var/lib/cowrie/ssh_host_dsa_key.pub
dsa_private_key = var/lib/cowrie/ssh_host_dsa_key
ecdsa_public_key = var/lib/cowrie/ssh_host_ecdsa_key.pub
ecdsa_private_key = var/lib/cowrie/ssh_host_ecdsa_key
ed25519_public_key = var/lib/cowrie/ssh_host_ed25519_key.pub
ed25519_private_key = var/lib/cowrie/ssh_host_ed25519_key
version = SSH-2.0-OpenSSH_6.0p1 Debian-4+deb7u2
listen_endpoints = tcp:2222:interface=0.0.0.0

[telnet]
enabled = true
listen_endpoints = tcp:2223:interface=0.0.0.0

[llm]
api_key = YOUR_OPENAI_API_KEY_HERE
model = gpt-4o-mini
host = https://api.openai.com
path = /v1/chat/completions
temperature = 0.7
max_tokens = 500
debug = false

[output_jsonlog]
enabled = true
logfile = var/log/cowrie/cowrie.json
epoch_timestamp = false

